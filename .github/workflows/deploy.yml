name: Deploy to Jiggabyte Intranet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Navigate to project root
          cd /home/jiggaby/intranet.jiggabyte.co.zm
          
          # Update code
          git pull origin main
          
          # Set up virtual environment if not exists
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          
          # Activate venv and update dependencies
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Install Playwright browsers
          playwright install chromium
          
          # Run database initialization/migrations
          python scripts/migrate_v2.py
          python scripts/seed_products.py
          
          # Restart the service (Passenger standard)
          mkdir -p tmp
          touch tmp/restart.txt
          
          echo "Deployment successful to intranet.jiggabyte.co.zm"
